name: Deploy KIRA Supreme to Koyeb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js 20.11.0
      uses: actions/setup-node@v3
      with:
        node-version: '20.11.0'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --production --legacy-peer-deps
      
    - name: Create necessary files
      run: |
        mkdir -p systems script/commands/data script/commands/cache backup logs
        touch appstate.json config.json
        
    - name: Build Docker image
      run: docker build -t kira-supreme:${{ github.sha }} .
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Push Docker image
      run: |
        docker tag kira-supreme:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/kira-supreme:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/kira-supreme:latest
        
    - name: Deploy to Koyeb
      uses: koyeb/action-deploy@v1
      with:
        service: kira-supreme
        token: ${{ secrets.KOYEB_TOKEN }}
        app: kira-supreme
        image: ${{ secrets.DOCKER_USERNAME }}/kira-supreme:latest
