version: '3.8'
services:
  kira-bot:
    build: .
    container_name: kira-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json
      - ./appstate.json:/app/appstate.json
    environment:
      - NODE_ENV=production
      - TZ=Asia/Baghdad
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
