name: kira-bot
services:
  - name: web
    ports:
      - port: 8000
        http_path: /
    env:
      - key: PORT
        value: "8000"
    build:
      dockerfile: |
        FROM node:24-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci --only=production
        COPY . .
        CMD ["npm", "start"]
